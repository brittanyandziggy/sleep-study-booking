              <div style={{ display: "flex", gap: 10, marginBottom: 14, flexWrap: "wrap" }}>
                <div><label>Date <span style={{ color: "#9AA0AA", textTransform: "none", letterSpacing: 0, fontSize: 10 }}>(blank = TBC)</span></label><DatePicker value={newSession.date} onChange={v => setNewSession({ ...newSession, date: v })} /></div>
                <div><label>Time</label><input type="time" value={newSession.time} onChange={e => setNewSession({ ...newSession, time: e.target.value })} style={{ width: 130 }} /></div>
              </div>
            ) : (
              <>
                <div style={{ background: "#EEF2FA", borderRadius: 5, padding: "7px 11px", fontSize: 12, color: "#1D58C4", marginBottom: 12 }}>Morning session auto-set to 12 hours after evening.</div>
                <div style={{ background: "#F7F5F2", borderRadius: 6, padding: 12, marginBottom: 10, border: "1px solid #E4E0DA" }}>
                  <div style={{ fontSize: 11, color: "#1D58C4", marginBottom: 8, fontWeight: "bold" }}>◑ EVENING SESSION</div>
                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                    <div><label>Date</label><DatePicker value={newSession.eveningDate} onChange={v => setNewSession({ ...newSession, eveningDate: v })} /></div>
                    <div><label>Time</label><input type="time" value={newSession.eveningTime} onChange={e => setNewSession({ ...newSession, eveningTime: e.target.value })} style={{ width: 130 }} /></div>
                  </div>
                </div>
                <div style={{ background: "#F7F5F2", borderRadius: 6, padding: 12, marginBottom: 14, border: "1px solid #E4E0DA" }}>
                  <div style={{ fontSize: 11, color: "#9A7C00", marginBottom: 8, fontWeight: "bold" }}>◐ MORNING SESSION <span style={{ color: "#9AA0AA", fontWeight: "normal", fontSize: 10 }}>auto</span></div>
                  <div style={{ display: "flex", gap: 10 }}>
                    <div><label>Date</label><input className="auto-field" type="text" value={morningPreview.date} readOnly placeholder="—" style={{ width: 100 }} /></div>
                    <div><label>Time</label><input className="auto-field" type="text" value={formatTime12(morningPreview.time)} readOnly placeholder="—" style={{ width: 130 }} /></div>
                  </div>
                </div>
              </>
            )}
            <div style={{ marginBottom: 18 }}>
              <button className="notes-toggle" onClick={() => setShowNewNotes(v => !v)}>{showNewNotes ? "▾ Hide notes" : "▸ Add notes"}</button>
              {showNewNotes && <textarea rows={3} value={newSession.notes} onChange={e => setNewSession({ ...newSession, notes: e.target.value })} placeholder="Any additional notes..." style={{ resize: "vertical", marginTop: 8 }} />}
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
              <button className="btn btn-ghost" onClick={() => { setShowAdd(false); setShowNewNotes(false); }}>Cancel</button>
              <button className="btn btn-primary" onClick={addSession}>Add Session{newSession.type === "study" ? "s" : ""}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Status Badge ─────────────────────────────────────────────────────────────

function StatusBadge({ session, size = 14 }) {
  if (!session.date && !session.cancelled) return null;
  if (session.cancelled) {
    return (
      <span title="Cancelled" style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: size + 4, height: size + 4, borderRadius: "50%", background: "#F3F4F6", color: "#6B7280", fontSize: size - 3, fontWeight: "bold", flexShrink: 0, border: "1px solid #D1D5DB" }}>
        ✕
      </span>
    );
  }
  if (!session.date) return null;
  const ok = isFullyConfirmed(session);
  const locked = isLockedIn(session);
  const bg = locked ? "#CCFBF1" : ok ? "#D1FAE5" : "#FEE2E2";
  const color = locked ? "#0F766E" : ok ? "#065F46" : "#991B1B";
  const border = locked ? "#5EEAD4" : ok ? "#6EE7B7" : "#FCA5A5";
  const label = locked ? "◉" : ok ? "✓" : "?";
  return (
    <span title={locked ? "Fully confirmed + in Outlook" : ok ? "Fully confirmed" : "Needs staff"} style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: size + 4, height: size + 4, borderRadius: "50%", background: bg, color, fontSize: size - 3, fontWeight: "bold", flexShrink: 0, border: `1px solid ${border}` }}>
      {label}
    </span>
  );
}

// ─── Session Card ─────────────────────────────────────────────────────────────

function SessionCard({ session, active, onClick, currentUser, availability, toggleAvailability }) {
  const type = SESSION_TYPES[session.type];
  const confirmed = (session.confirmedStaff || []).length;
  const required = type.required;
  const myAvail = currentUser ? (availability || {})[`${session.id}-${currentUser}`] : null;
  return (
    <div className={`session-card ${active ? "active" : ""}`} onClick={onClick}
      style={session.cancelled ? { opacity: 0.55, background: "#F9F9F9" } : {}}>
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 3, flexWrap: "wrap" }}>
            <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: session.cancelled ? "#9CA3AF" : type.color, flexShrink: 0 }} />
            <span style={{ fontSize: 12, color: session.cancelled ? "#6B7280" : type.textColor, fontWeight: "bold", textDecoration: session.cancelled ? "line-through" : "none" }}>{type.label}</span>
            {session.cancelled && <span style={{ fontSize: 9, color: "#fff", background: "#6B7280", borderRadius: 3, padding: "1px 5px", fontWeight: "700" }}>CANCELLED</span>}
            {!session.cancelled && session.linkedIds?.length > 0 && <span className="linked-badge">linked</span>}
          </div>
          {session.participantId && <div style={{ fontSize: 12, fontWeight: "600", color: session.cancelled ? "#9CA3AF" : "#1A2130", marginBottom: 2, textDecoration: session.cancelled ? "line-through" : "none" }}>{session.participantId}</div>}
          {session.date ? <div style={{ fontSize: 11, color: "#6B7A8D" }}>{formatDateLong(session.date, session.time)}</div> : <div style={{ fontSize: 11, color: "#9AA0AA", fontStyle: "italic" }}>Date TBC</div>}
          {session.notes && !session.cancelled && <div style={{ fontSize: 11, color: "#9AA0AA", marginTop: 3, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{session.notes}</div>}
        </div>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4, flexShrink: 0 }}>
          <StatusBadge session={session} />
          {!session.cancelled && session.date && <span style={{ fontSize: 10, color: confirmed >= required ? "#276644" : "#9AA0AA" }}>{confirmed}/{required}</span>}
          {!session.cancelled && isLockedIn(session) && <span style={{ fontSize: 9, color: "#0F766E", background: "#CCFBF1", border: "1px solid #5EEAD4", borderRadius: 3, padding: "1px 5px", fontWeight: "700" }}>In Outlook</span>}
        </div>
      </div>
      {currentUser && !session.cancelled && (
        <div style={{ marginTop: 8, paddingTop: 6, borderTop: "1px solid #F0EEE8" }}>
          <button
            onClick={e => { e.stopPropagation(); toggleAvailability(session.id, currentUser); }}
            className={`avail-chip ${myAvail === "available" ? "avail-available" : myAvail === "unavailable" ? "avail-unavailable" : "avail-none"}`}
            style={{ fontSize: 10, padding: "3px 8px" }}
          >
            {myAvail === "available" ? "✓ I'm available" : myAvail === "unavailable" ? "✕ Can't do this" : "Set my availability"}
          </button>
        </div>
      )}
    </div>
  );
}

// ─── Session Detail ───────────────────────────────────────────────────────────

function SessionDetail({ session, sessions, updateSessions, team, availability, toggleAvailability, toggleConfirm, removeSession, toggleCalendarAdded, cancelSession }) {
  const [editing, setEditing] = useState(false);
  const [editData, setEditData] = useState({ date: session.date || "", time: session.time || "", participantId: session.participantId || "", notes: session.notes || "" });
  const [showEditNotes, setShowEditNotes] = useState(!!session.notes);
  const [overrideData, setOverrideData] = useState(null); // null = closed, object = editing
  const [showCancelConfirm, setShowCancelConfirm] = useState(false);
  const type = SESSION_TYPES[session.type];
  const required = type.required;
  const confirmed = session.confirmedStaff || [];

  useEffect(() => {
    setEditData({ date: session.date || "", time: session.time || "", participantId: session.participantId || "", notes: session.notes || "" });
    setShowEditNotes(!!session.notes);
    setEditing(false);
    setOverrideData(null);
    setShowCancelConfirm(false);
  }, [session.id]);

  const editMorningPreview = calcMorningFromEvening(editData.date, editData.time);

  function saveEdit() {
    updateSessions(prev => prev.map(s => {
      if (s.id === session.id) return { ...s, date: editData.date || null, time: editData.time || null, participantId: editData.participantId || null, notes: editData.notes };
      if (session.type === "evening" && session.linkedIds?.includes(s.id) && s.type === "morning") {
        const base = { ...s, participantId: editData.participantId || null };
        if (s.manualMorningTime) return base;
        const { date: mDate, time: mTime } = calcMorningFromEvening(editData.date, editData.time);
        return { ...base, date: mDate || null, time: mTime || null };
      }
      return s;
    }));
    setEditing(false);
  }

  const linkedSessions = session.linkedIds?.map(id => sessions.find(s => s.id === id)).filter(Boolean) || [];
  const linkedMorning = session.type === "evening" ? linkedSessions.find(s => s.type === "morning") : null;
  const linkedEvening = session.type === "morning" ? linkedSessions.find(s => s.type === "evening") : null;

  return (
    <div style={{ maxWidth: 540 }}>
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 20 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
            <span style={{ display: "inline-block", width: 12, height: 12, borderRadius: 3, background: type.color }} />
            <span style={{ fontSize: 18, fontWeight: "bold", color: "#1A2130" }}>{type.label}</span>
            <StatusBadge session={session} size={16} />
          </div>
          {session.participantId && !editing && <div style={{ fontSize: 14, fontWeight: "600", color: "#1A2130", marginBottom: 2 }}>{session.participantId}</div>}
          {!editing && <div style={{ fontSize: 13, color: "#6B7A8D" }}>{session.date ? formatDate(session.date, session.time) : <span style={{ fontStyle: "italic", color: "#9AA0AA" }}>Date not yet set</span>}</div>}
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {!session.cancelled && session.type !== "morning" && <button className="btn btn-ghost" onClick={() => { setEditing(!editing); setShowCancelConfirm(false); }}>{editing ? "Cancel" : "Edit"}</button>}
          {!session.cancelled && !showCancelConfirm && (
            <button className="btn btn-ghost" style={{ color: "#B45309", borderColor: "#FCD34D", background: "#FFFBEB" }} onClick={() => { setShowCancelConfirm(true); setEditing(false); }}>
              Cancel Booking
            </button>
          )}
          {session.cancelled && (
            <button className="btn btn-ghost" style={{ color: "#276644", borderColor: "#6EE7B7", background: "#F0FDF4" }} onClick={() => cancelSession(session.id)}>
              Uncancel
            </button>
          )}
          <button className="btn btn-danger" onClick={() => removeSession(session.id)}>{session.linkedIds?.length > 0 ? "Remove Pair" : "Remove"}</button>
        </div>
      </div>

      {showCancelConfirm && !session.cancelled && (
        <div style={{ marginBottom: 20, padding: "14px 16px", background: "#FFFBEB", borderRadius: 8, border: "1px solid #FCD34D" }}>
          <div style={{ fontSize: 13, fontWeight: "600", color: "#92400E", marginBottom: 6 }}>
            Cancel this booking{session.linkedIds?.length > 0 ? " (and its linked session)" : ""}?
          </div>
          <div style={{ fontSize: 12, color: "#A16207", marginBottom: 12 }}>
            The session will be kept in the list but marked as cancelled. You can uncancel it at any time.
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => { cancelSession(session.id); setShowCancelConfirm(false); }}
              style={{ padding: "6px 16px", borderRadius: 6, fontSize: 12, cursor: "pointer", fontFamily: "Arial, Helvetica, sans-serif", fontWeight: "700", background: "#B45309", color: "#fff", border: "none" }}>
              Yes, Cancel Booking
            </button>
            <button className="btn btn-ghost" onClick={() => setShowCancelConfirm(false)}>No, Keep It</button>
          </div>
        </div>
      )}

      {session.cancelled && (
        <div style={{ marginBottom: 20, padding: "12px 16px", background: "#F3F4F6", borderRadius: 8, border: "1px solid #D1D5DB", display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 18, color: "#6B7280" }}>✕</span>
          <div>
            <div style={{ fontSize: 13, fontWeight: "700", color: "#374151" }}>Booking Cancelled</div>
            <div style={{ fontSize: 12, color: "#6B7280" }}>This session has been cancelled. Use "Uncancel" to restore it.</div>
          </div>
        </div>
      )}

      {editing && (
        <div style={{ background: "#F7F5F2", borderRadius: 8, padding: 16, marginBottom: 20, border: "1px solid #E4E0DA" }}>
          <div style={{ marginBottom: 12 }}><label>Participant ID</label><input type="text" value={editData.participantId} onChange={e => setEditData({ ...editData, participantId: e.target.value })} placeholder="e.g. P042" /></div>
          <div style={{ display: "flex", gap: 10, marginBottom: 12, flexWrap: "wrap" }}>
            <div><label>Date <span style={{ color: "#9AA0AA", textTransform: "none", letterSpacing: 0, fontSize: 10 }}>(DD/MM)</span></label><DatePicker value={editData.date} onChange={v => setEditData({ ...editData, date: v })} /></div>
            <div><label>Time</label><input type="time" value={editData.time} onChange={e => setEditData({ ...editData, time: e.target.value })} style={{ width: 130 }} /></div>
          </div>
          {session.type === "evening" && editMorningPreview.date && !linkedMorning?.manualMorningTime && (
            <div style={{ fontSize: 12, color: "#7A5800", marginBottom: 12, background: "#FEF9C3", padding: "6px 10px", borderRadius: 4 }}>◐ Morning will update to {formatDate(editMorningPreview.date, editMorningPreview.time)}</div>
          )}
          {session.type === "evening" && linkedMorning?.manualMorningTime && (
            <div style={{ fontSize: 12, color: "#854D0E", marginBottom: 12, background: "#FEF3C7", padding: "6px 10px", borderRadius: 4, border: "1px solid #FCD34D" }}>⚠ Morning time is manually overridden — it will not be changed</div>
          )}
          <div style={{ marginBottom: 12 }}>
            <button className="notes-toggle" onClick={() => setShowEditNotes(v => !v)} style={{ marginBottom: 6 }}>{showEditNotes ? "▾ Hide notes" : "▸ Add notes"}</button>
            {showEditNotes && <textarea rows={2} value={editData.notes} onChange={e => setEditData({ ...editData, notes: e.target.value })} style={{ resize: "vertical", marginTop: 4 }} />}
          </div>
          <button className="btn btn-primary" onClick={saveEdit}>Save</button>
        </div>
      )}

      {session.notes && !editing && <div style={{ color: "#6B7A8D", fontSize: 13, marginBottom: 18, padding: "10px 14px", background: "#F7F5F2", borderRadius: 6, borderLeft: `3px solid ${type.color}` }}>{session.notes}</div>}
      {session.type === "morning" && !overrideData && (
        <div style={{ marginBottom: 16, borderRadius: 8, border: "1px solid #E4E0DA", background: "#F7F5F2", padding: "12px 14px" }}>
          {session.manualMorningTime ? (
            <div>
              <div style={{ fontSize: 12, color: "#854D0E", fontWeight: "600", marginBottom: 6 }}>⚠ Time manually overridden</div>
              <div style={{ fontSize: 12, color: "#6B7A8D", marginBottom: 10 }}>This morning session is using a custom time instead of the auto-calculated time.</div>
              <div style={{ display: "flex", gap: 8 }}>
                <button className="btn btn-ghost" style={{ fontSize: 11, padding: "5px 10px" }} onClick={() => setOverrideData({ date: session.date || "", time: session.time || "" })}>Edit Override</button>
                <button className="btn btn-ghost" style={{ fontSize: 11, padding: "5px 10px" }} onClick={() => {
                  if (!linkedEvening) return;
                  const { date: mDate, time: mTime } = calcMorningFromEvening(linkedEvening.date, linkedEvening.time);
                  updateSessions(prev => prev.map(s => s.id !== session.id ? s : { ...s, date: mDate || null, time: mTime || null, manualMorningTime: false }));
                }}>Reset to Auto (+12hrs)</button>
              </div>
            </div>
          ) : (
            <div>
              <div style={{ fontSize: 12, color: "#9AA0AA", fontStyle: "italic", marginBottom: 8 }}>Time is auto-set to 12 hours after the Evening Study.</div>
              <button className="btn btn-ghost" style={{ fontSize: 11, padding: "5px 10px" }} onClick={() => setOverrideData({ date: session.date || "", time: session.time || "" })}>Override Time Manually</button>
            </div>
          )}
        </div>
      )}
      {session.type === "morning" && overrideData && (
        <div style={{ background: "#F7F5F2", borderRadius: 8, padding: 16, marginBottom: 16, border: "1px solid #E4E0DA" }}>
          <div style={{ fontSize: 12, fontWeight: "600", color: "#1A2130", marginBottom: 10 }}>Override Morning Session Time</div>
          <div style={{ display: "flex", gap: 10, marginBottom: 12, flexWrap: "wrap" }}>
            <div><label>Date <span style={{ color: "#9AA0AA", textTransform: "none", letterSpacing: 0, fontSize: 10 }}>(DD/MM)</span></label><DatePicker value={overrideData.date} onChange={v => setOverrideData({ ...overrideData, date: v })} /></div>
            <div><label>Time</label><input type="time" value={overrideData.time} onChange={e => setOverrideData({ ...overrideData, time: e.target.value })} style={{ width: 130 }} /></div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="btn btn-primary" onClick={() => {
              updateSessions(prev => prev.map(s => s.id !== session.id ? s : { ...s, date: overrideData.date || null, time: overrideData.time || null, manualMorningTime: true }));
              setOverrideData(null);
            }}>Save Override</button>
            <button className="btn btn-ghost" onClick={() => setOverrideData(null)}>Cancel</button>
          </div>
        </div>
      )}

      {linkedSessions.length > 0 && (
        <div style={{ marginBottom: 20 }}>
          <div className="section-title">Linked Session</div>
          {linkedSessions.map(ls => {
            const lt = SESSION_TYPES[ls.type];
            return (
              <div key={ls.id} style={{ background: "#F7F5F2", borderRadius: 6, padding: 10, display: "flex", alignItems: "center", gap: 10, border: "1px solid #E4E0DA" }}>
                <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: lt.color }} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12, color: lt.textColor, fontWeight: "bold" }}>{lt.label}</div>
                  <div style={{ fontSize: 11, color: "#6B7A8D" }}>{ls.date ? formatDate(ls.date, ls.time) : <span style={{ fontStyle: "italic", color: "#9AA0AA" }}>Date TBC</span>}</div>
                </div>
                <StatusBadge session={ls} size={13} />
              </div>
            );
          })}
        </div>
      )}

      <div style={{ marginBottom: 20, opacity: session.cancelled ? 0.4 : 1, pointerEvents: session.cancelled ? "none" : "auto" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <div className="section-title" style={{ marginBottom: 0 }}>Confirm Staff</div>
          <span style={{ fontSize: 11, color: confirmed.length >= required ? "#276644" : "#9AA0AA" }}>{confirmed.length}/{required} confirmed</span>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {team.map(member => {
            const isConfirmed = confirmed.includes(member);
            const avail = availability[`${session.id}-${member}`];
            return (
              <div key={member} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 12px", background: isConfirmed ? "#F0FDF4" : "#fff", borderRadius: 6, border: `1px solid ${isConfirmed ? "#6EE7B7" : "#E4E0DA"}` }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ fontSize: 13, fontWeight: isConfirmed ? "600" : "normal", color: "#1A2130" }}>{member}</div>
                  {avail === "available" && !isConfirmed && <span style={{ fontSize: 10, color: "#276644", background: "#E6F4EC", border: "1px solid #5AAA7A55", borderRadius: 10, padding: "1px 7px" }}>Available</span>}
                  {avail === "unavailable" && !isConfirmed && <span style={{ fontSize: 10, color: "#8A2020", background: "#FAE8E8", border: "1px solid #C0707055", borderRadius: 10, padding: "1px 7px" }}>Unavailable</span>}
                </div>
                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  <button className={`avail-chip ${avail === "available" ? "avail-available" : avail === "unavailable" ? "avail-unavailable" : "avail-none"}`} onClick={() => toggleAvailability(session.id, member)}>
                    {avail === "available" ? "✓ Avail" : avail === "unavailable" ? "✕ Unavail" : "Available?"}
                  </button>
                  <button className={`confirm-btn ${isConfirmed ? "confirmed" : "unconfirmed"}`} onClick={() => toggleConfirm(session.id, member)}>
                    {isConfirmed ? "✓ Confirmed" : "Confirm"}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
        {confirmed.length > 0 && (
          <div style={{ marginTop: 10, padding: "8px 12px", background: "#F0FDF4", borderRadius: 6, border: "1px solid #6EE7B755" }}>
            <div style={{ fontSize: 11, color: "#065F46", fontWeight: "bold", marginBottom: 4 }}>CONFIRMED STAFF</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {confirmed.map(m => <span key={m} style={{ fontSize: 12, color: "#065F46", background: "#D1FAE5", border: "1px solid #6EE7B7", borderRadius: 4, padding: "2px 8px" }}>{m}</span>)}
            </div>
          </div>
        )}
      </div>

      {/* Outlook calendar lock-in */}
      {session.date && !session.cancelled && (
        <div style={{ marginBottom: 20 }}>
          <div className="section-title">Outlook Calendar</div>
          {!isFullyConfirmed(session) ? (
            <div style={{ padding: "10px 14px", borderRadius: 8, background: "#F7F5F2", border: "1px solid #E4E0DA", fontSize: 12, color: "#9AA0AA" }}>
              Available once all required staff are confirmed ({confirmed.length}/{required}).
            </div>
          ) : (
            <div style={{ padding: "12px 14px", borderRadius: 8, background: session.calendarAdded ? "#F0FDF9" : "#FEFCE8", border: `1px solid ${session.calendarAdded ? "#5EEAD4" : "#FCD34D"}`, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
              <div>
                <div style={{ fontSize: 13, fontWeight: "700", color: session.calendarAdded ? "#0F766E" : "#854D0E", marginBottom: 2 }}>
                  {session.calendarAdded ? "◉ Added to Outlook — Locked in" : "○ Not yet in Outlook"}
                </div>
                <div style={{ fontSize: 11, color: session.calendarAdded ? "#0F766E" : "#A16207" }}>
                  {session.calendarAdded
                    ? session.linkedIds?.length > 0 ? "Both sessions locked in to the schedule" : "Session locked in to the schedule"
                    : "Fully staffed — ready to add to the Teams calendar"}
                </div>
              </div>
              <button
                onClick={() => toggleCalendarAdded(session.id)}
                style={{ padding: "7px 14px", borderRadius: 6, fontSize: 12, cursor: "pointer", fontFamily: "Arial, Helvetica, sans-serif", fontWeight: "600", flexShrink: 0, background: session.calendarAdded ? "#fff" : "#0F766E", color: session.calendarAdded ? "#A03030" : "#fff", border: `1px solid ${session.calendarAdded ? "#FCA5A5" : "#0F766E"}`, transition: "all 0.15s" }}
              >{session.calendarAdded ? "Unmark" : "Mark as Added"}</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── Calendar Chip ────────────────────────────────────────────────────────────

function CalChip({ session, onClick, compact = false, availability = null }) {
  const t = SESSION_TYPES[session.type];
  const ok = isFullyConfirmed(session);
  const typeShort = session.type === "screening" ? "Screening" : session.type === "evening" ? "Evening" : "Morning";
  const availMembers = availability
    ? TEAM.filter(m => availability[`${session.id}-${m}`] === "available")
    : [];
  const confirmedMembers = session.confirmedStaff || [];
  return (
    <button className="cal-chip" onClick={onClick}
      style={{ background: session.cancelled ? "#F3F4F6" : t.bg, color: session.cancelled ? "#9CA3AF" : t.textColor, border: `1px solid ${session.cancelled ? "#D1D5DB" : t.color + "66"}`, padding: compact ? "7px 8px" : "6px 8px", opacity: session.cancelled ? 0.7 : 1 }}
      title={`${t.label}${session.participantId ? " — " + session.participantId : ""}${session.time ? " · " + session.time : ""}${session.cancelled ? " · CANCELLED" : ""}`}
    >
      <div style={{ display: "flex", alignItems: "flex-start", gap: 4, justifyContent: "space-between" }}>
        <div style={{ minWidth: 0, flex: 1 }}>
          <div style={{ fontWeight: "bold", fontSize: 11, lineHeight: 1.3, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
            {typeShort}{session.participantId ? ` · ${session.participantId}` : ""}
          </div>
          {session.time && <div style={{ fontSize: 10, opacity: 0.8, lineHeight: 1.3 }}>{formatTime12(session.time)}</div>}
          {session.cancelled && (
            <div style={{ marginTop: 3 }}>
              <span style={{ fontSize: 8, color: "#6B7280", fontWeight: "700", lineHeight: "1.6", background: "#E5E7EB", borderRadius: 2, padding: "0 4px" }}>Cancelled</span>
            </div>
          )}
          {!session.cancelled && session.calendarAdded && (
            <div style={{ marginTop: 3 }}>
              <div style={{ fontSize: 8, color: "#0F766E", fontWeight: "700", lineHeight: "1.8" }}>Added to Outlook</div>
              {confirmedMembers.length > 0 && (
                <div style={{ display: "flex", gap: 2, flexWrap: "wrap", alignItems: "center" }}>
                  <span style={{ fontSize: 8, color: "#064E3B", fontWeight: "700", lineHeight: "1.6", flexShrink: 0 }}>Working:</span>
                  {confirmedMembers.map(m => (
                    <span key={m} style={{ fontSize: 9, fontWeight: "700", color: "#064E3B", background: "#6EE7B7", borderRadius: 2, padding: "0 4px", lineHeight: "1.6" }}>
                      {m}
                    </span>
                  ))}
                </div>
              )}
            </div>
          )}
          {!session.cancelled && !session.calendarAdded && confirmedMembers.length > 0 && (
            <div style={{ marginTop: 3 }}>
              <div style={{ display: "flex", gap: 2, flexWrap: "wrap", alignItems: "center", marginBottom: 2 }}>
                <span style={{ fontSize: 8, color: "#064E3B", fontWeight: "700", lineHeight: "1.6", flexShrink: 0 }}>Confirmed:</span>
                {confirmedMembers.map(m => (
                  <span key={m} style={{ fontSize: 9, fontWeight: "700", color: "#064E3B", background: "#6EE7B7", borderRadius: 2, padding: "0 4px", lineHeight: "1.6" }}>
                    {m}
                  </span>
                ))}
              </div>
              {availMembers.filter(m => !confirmedMembers.includes(m)).length > 0 && (
                <div style={{ display: "flex", gap: 2, flexWrap: "wrap", alignItems: "center" }}>
                  <span style={{ fontSize: 8, color: "#15803D", fontWeight: "700", lineHeight: "1.6", flexShrink: 0 }}>Available:</span>
                  {availMembers.filter(m => !confirmedMembers.includes(m)).map(m => (
                    <span key={m} style={{ fontSize: 9, fontWeight: "400", color: "#16A34A", background: "rgba(220,252,231,0.7)", borderRadius: 2, padding: "0 4px", lineHeight: "1.6" }}>
                      {m}
                    </span>
                  ))}
                </div>
              )}
            </div>
          )}
          {!session.cancelled && !session.calendarAdded && confirmedMembers.length === 0 && availMembers.length > 0 && (
            <div style={{ marginTop: 3, display: "flex", gap: 2, flexWrap: "wrap", alignItems: "center" }}>
              <span style={{ fontSize: 8, color: "#15803D", fontWeight: "700", lineHeight: "1.6", flexShrink: 0 }}>Available:</span>
              {availMembers.map(m => (
                <span key={m} style={{ fontSize: 9, fontWeight: "400", color: "#16A34A", background: "rgba(220,252,231,0.7)", borderRadius: 2, padding: "0 4px", lineHeight: "1.6" }}>
                  {m}
                </span>
              ))}
            </div>
          )}
        </div>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 2, flexShrink: 0 }}>
          <StatusBadge session={session} size={13} />
        </div>
      </div>
    </button>
  );
}

// ─── Legend ───────────────────────────────────────────────────────────────────

function Legend() {
  return (
    <div style={{ display: "flex", gap: 16, marginTop: 12, paddingTop: 10, borderTop: "1px solid #E4E0DA", flexWrap: "wrap", alignItems: "center" }}>
      {Object.entries(SESSION_TYPES).map(([k, t]) => (
        <div key={k} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: "#6B7A8D" }}>
          <span style={{ display: "inline-block", width: 10, height: 10, borderRadius: 2, background: t.color }} /> {t.label}
        </div>
      ))}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginLeft: 8, borderLeft: "1px solid #E4E0DA", paddingLeft: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#6B7A8D" }}>
          <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 14, height: 14, borderRadius: "50%", background: "#CCFBF1", color: "#0F766E", fontSize: 8, fontWeight: "bold", border: "1px solid #5EEAD4" }}>◉</span> In Outlook
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#6B7A8D" }}>
          <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 14, height: 14, borderRadius: "50%", background: "#D1FAE5", color: "#065F46", fontSize: 8, fontWeight: "bold", border: "1px solid #6EE7B7" }}>✓</span> Confirmed
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#6B7A8D" }}>
          <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 14, height: 14, borderRadius: "50%", background: "#FEE2E2", color: "#991B1B", fontSize: 8, fontWeight: "bold", border: "1px solid #FCA5A5" }}>?</span> Needs staff
        </div>
      </div>
    </div>
  );
}

// ─── Week View ────────────────────────────────────────────────────────────────

function WeekView({ weekStart, setWeekStart, sessionsByDate, onSelectSession, activeSession, availability = {} }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const days = Array.from({ length: 5 }, (_, i) => addDays(weekStart, i));
  const fmtH = d => d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
  const weekLabel = `${fmtH(weekStart)} – ${fmtH(addDays(weekStart, 4))}, ${weekStart.getFullYear()}`;
  return (
    <div style={{ padding: "20px", height: "100%", display: "flex", flexDirection: "column" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
        <div style={{ fontSize: 14, fontWeight: "600", color: "#1A2130" }}>{weekLabel}</div>
        <div style={{ display: "flex", gap: 6 }}>
          <button className="btn-icon" onClick={() => setWeekStart(d => addDays(d, -7))}>‹</button>
          <button className="btn-icon" onClick={() => setWeekStart(getMonday(today))}>Today</button>
          <button className="btn-icon" onClick={() => setWeekStart(d => addDays(d, 7))}>›</button>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 8, flex: 1 }}>
        {days.map((day, i) => {
          const key = dateToKey(day);
          const daySessions = (sessionsByDate[key] || []).sort((a, b) => (a.time || "").localeCompare(b.time || ""));
          const isToday = isSameDay(day, today);
          return (
            <div key={key} style={{ background: isToday ? "#F0F4FF" : "#fff", border: `1px solid ${isToday ? "#A8B8D8" : "#E4E0DA"}`, borderRadius: 8, padding: "10px 8px", display: "flex", flexDirection: "column", minHeight: 160 }}>
              <div style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 10, color: "#9AA0AA", textTransform: "uppercase", letterSpacing: "0.06em" }}>{DAY_SHORT[i]}</div>
                <div style={{ fontSize: 20, fontWeight: "700", color: isToday ? "#3A5FA5" : "#1A2130", lineHeight: 1.1 }}>{day.getDate()}</div>
                <div style={{ fontSize: 10, color: "#C0BDB8" }}>{day.toLocaleDateString("en-GB",{month:"short"})}</div>
              </div>
              <div style={{ flex: 1 }}>
                {daySessions.map(s => <CalChip key={s.id} session={s} onClick={() => onSelectSession(s.id)} availability={availability} />)}
              </div>
              {daySessions.length === 0 && <div style={{ fontSize: 10, color: "#E0DDD9", textAlign: "center", marginTop: "auto" }}>—</div>}
            </div>
          );
        })}
      </div>
      <Legend />
    </div>
  );
}

// ─── Month View ───────────────────────────────────────────────────────────────

function MonthView({ year, month, setMonth, sessionsByDate, onSelectSession, availability = {} }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startMonday = getMonday(firstDay);
  const endFriday = (() => {
    const d = new Date(lastDay);
    const dow = d.getDay();
    if (dow === 0) d.setDate(d.getDate() - 2);
    else if (dow === 6) d.setDate(d.getDate() - 1);
    else d.setDate(d.getDate() + (5 - dow));
    return d;
  })();
  const weekdays = [];
  const cursor = new Date(startMonday);
  while (cursor <= endFriday) {
    const dow = cursor.getDay();
    if (dow >= 1 && dow <= 5) weekdays.push(new Date(cursor));
    cursor.setDate(cursor.getDate() + 1);
  }
  return (
    <div style={{ padding: "20px", display: "flex", flexDirection: "column", height: "100%" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
        <div style={{ fontSize: 14, fontWeight: "600", color: "#1A2130" }}>{MONTH_NAMES[month]} {year}</div>
        <div style={{ display: "flex", gap: 6 }}>
          <button className="btn-icon" onClick={() => setMonth(({year:y, month:m}) => m === 0 ? {year:y-1,month:11} : {year:y,month:m-1})}>‹</button>
          <button className="btn-icon" onClick={() => { const n=new Date(); setMonth({year:n.getFullYear(),month:n.getMonth()}); }}>Today</button>
          <button className="btn-icon" onClick={() => setMonth(({year:y, month:m}) => m === 11 ? {year:y+1,month:0} : {year:y,month:m+1})}>›</button>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", borderTop: "1px solid #E4E0DA", borderLeft: "1px solid #E4E0DA" }}>
        {DAY_SHORT.map(d => <div key={d} style={{ padding: "5px 6px", fontSize: 10, color: "#9AA0AA", textAlign: "center", borderRight: "1px solid #E4E0DA", borderBottom: "1px solid #E4E0DA", background: "#FAFAF8", textTransform: "uppercase", letterSpacing: "0.06em" }}>{d}</div>)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", borderLeft: "1px solid #E4E0DA", flex: 1 }}>
        {weekdays.map(day => {
          const key = dateToKey(day);
          const inMonth = day.getMonth() === month;
          const isToday = isSameDay(day, today);
          const daySessions = (sessionsByDate[key] || []).sort((a, b) => (a.time||"").localeCompare(b.time||""));
          return (
            <div key={key} style={{ minHeight: 110, padding: "5px 5px", borderRight: "1px solid #E4E0DA", borderBottom: "1px solid #E4E0DA", background: isToday ? "#F0F4FF" : !inMonth ? "#FAFAF8" : "#fff" }}>
              <div style={{ fontSize: 12, fontWeight: isToday ? "700" : "400", color: isToday ? "#3A5FA5" : !inMonth ? "#C0BDB8" : "#1A2130", marginBottom: 3 }}>
                {isToday ? <span style={{ background: "#3A5FA5", color: "#fff", borderRadius: "50%", width: 18, height: 18, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 10 }}>{day.getDate()}</span> : day.getDate()}
              </div>
              {daySessions.slice(0,4).map(s => <CalChip key={s.id} session={s} onClick={() => onSelectSession(s.id)} compact availability={availability} />)}
              {daySessions.length > 4 && <div style={{ fontSize: 10, color: "#9AA0AA", marginTop: 1 }}>+{daySessions.length - 4} more</div>}
            </div>
          );
        })}
      </div>
      <Legend />
    </div>
  );
}

// ─── List View ────────────────────────────────────────────────────────────────

function ListView({ sessions, team, onSelectSession, activeSession }) {
  const [filterMember, setFilterMember] = useState("all");
  const booked = sessions.filter(s => s.date).sort((a, b) => sortKey(a.date, a.time).localeCompare(sortKey(b.date, b.time)));
  const filtered = filterMember === "all" ? booked : booked.filter(s => (s.confirmedStaff || []).includes(filterMember));
  const grouped = {};
  filtered.forEach(s => { if (!grouped[s.date]) grouped[s.date] = []; grouped[s.date].push(s); });
  const dateKeys = Object.keys(grouped).sort();

  function formatGroupDate(ddmm) {
    if (!ddmm) return "";
    const [d, mo] = ddmm.split("/");
    const dt = new Date(`2026-${mo}-${d}T00:00:00`);
    return isNaN(dt) ? ddmm : dt.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" });
  }

  return (
    <div style={{ padding: "20px 24px", height: "100%", display: "flex", flexDirection: "column" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
        <span style={{ fontSize: 12, color: "#6B7A8D", fontWeight: "600", marginRight: 4 }}>Filter by:</span>
        {["all", ...team].map(m => (
          <button key={m} onClick={() => setFilterMember(m)}
            style={{ border: "1px solid", borderRadius: 20, padding: "4px 14px", fontSize: 12, cursor: "pointer", fontFamily: "Arial, Helvetica, sans-serif", transition: "all 0.15s", background: filterMember === m ? "#1D58C4" : "#fff", color: filterMember === m ? "#fff" : "#6B7A8D", borderColor: filterMember === m ? "#1D58C4" : "#D0CCC6", fontWeight: filterMember === m ? "600" : "normal" }}
          >{m === "all" ? "All sessions" : m}</button>
        ))}
      </div>
      <div style={{ flex: 1, overflowY: "auto" }}>
        {dateKeys.length === 0 ? (
          <div style={{ textAlign: "center", color: "#C0BDB8", fontSize: 13, marginTop: 60 }}>
            <div style={{ fontSize: 28, marginBottom: 10 }}>◈</div>
            {filterMember === "all" ? "No booked sessions yet." : `No confirmed sessions for ${filterMember}.`}
          </div>
        ) : dateKeys.map(dateKey => (
          <div key={dateKey} style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 11, fontWeight: "700", color: "#9AA0AA", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8, paddingBottom: 6, borderBottom: "1px solid #E4E0DA" }}>
              {formatGroupDate(dateKey)} <span style={{ fontWeight: "400", color: "#C0BDB8" }}>· {dateKey}/2026</span>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {grouped[dateKey].map(s => {
                const t = SESSION_TYPES[s.type];
                const isActive = s.id === activeSession;
                return (
                  <div key={s.id} onClick={() => onSelectSession(s.id)}
                    style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", borderRadius: 7, cursor: "pointer", background: isActive ? "#EEF2FA" : "#fff", border: `1px solid ${isActive ? "#3A5FA5" : "#E4E0DA"}`, transition: "all 0.12s" }}
                    onMouseEnter={e => { if (!isActive) { e.currentTarget.style.background = "#F7F8FF"; e.currentTarget.style.borderColor = "#A8B8D8"; }}}
                    onMouseLeave={e => { if (!isActive) { e.currentTarget.style.background = "#fff"; e.currentTarget.style.borderColor = "#E4E0DA"; }}}
                  >
                    <div style={{ width: 4, alignSelf: "stretch", borderRadius: 2, background: t.color, flexShrink: 0 }} />
                    <div style={{ width: 56, flexShrink: 0, textAlign: "right" }}><span style={{ fontSize: 12, fontWeight: "600", color: "#6B7A8D" }}>{s.time ? formatTime12(s.time) : "—"}</span></div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                        <span style={{ fontSize: 12, fontWeight: "700", color: t.textColor }}>{t.label}</span>
                        {s.participantId && <span style={{ fontSize: 12, color: "#1A2130", fontWeight: "600" }}>· {s.participantId}</span>}
                        {s.linkedIds?.length > 0 && <span style={{ fontSize: 10, color: "#6B7A8D", background: "#F0EEF8", border: "1px solid #C0BCD855", borderRadius: 3, padding: "1px 5px" }}>linked</span>}
                      </div>
                      <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                        {(s.confirmedStaff || []).length > 0
                          ? s.confirmedStaff.map(m => <span key={m} style={{ fontSize: 10, color: "#065F46", background: "#D1FAE5", border: "1px solid #6EE7B755", borderRadius: 3, padding: "1px 6px" }}>{m}</span>)
                          : <span style={{ fontSize: 10, color: "#9AA0AA", fontStyle: "italic" }}>No staff confirmed</span>}
                      </div>
                    </div>
                    <StatusBadge session={s} size={16} />
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Needs Confirmation View ──────────────────────────────────────────────────

function NeedsConfirmationView({ sessions, onSelectSession, activeSession }) {
  const needsSessions = sessions
    .filter(s => !isFullyConfirmed(s))
    .sort((a, b) => {
      if (!a.date && !b.date) return 0;
      if (!a.date) return 1;
      if (!b.date) return -1;
      return sortKey(a.date, a.time).localeCompare(sortKey(b.date, b.time));
    });

  const grouped = {};
  needsSessions.forEach(s => {
    const key = s.date || "__tbc__";
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(s);
  });
  const dateKeys = Object.keys(grouped).sort((a, b) => {
    if (a === "__tbc__") return 1;
    if (b === "__tbc__") return -1;
    return a.localeCompare(b);
  });

  function formatGroupDate(ddmm) {
    if (!ddmm) return "Date TBC";
    const [d, mo] = ddmm.split("/");
    const dt = new Date(`2026-${mo}-${d}T00:00:00`);
    return isNaN(dt) ? ddmm : dt.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" });
  }

  if (needsSessions.length === 0) {
    return (
      <div style={{ padding: "20px 24px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%" }}>
        <div style={{ textAlign: "center", color: "#276644", fontSize: 13 }}>
          <div style={{ fontSize: 32, marginBottom: 12 }}>✓</div>
          All sessions are fully confirmed!
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: "20px 24px", height: "100%", display: "flex", flexDirection: "column" }}>
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 14, fontWeight: "700", color: "#1A2130" }}>
          Needs Confirmation
          <span style={{ marginLeft: 8, fontSize: 12, color: "#991B1B", background: "#FEE2E2", borderRadius: 10, padding: "1px 8px" }}>{needsSessions.length}</span>
        </div>
        <div style={{ fontSize: 12, color: "#9AA0AA", marginTop: 2 }}>Sessions that still need staff to lock in before moving to Outlook</div>
      </div>
      <div style={{ flex: 1, overflowY: "auto" }}>
        {dateKeys.map(dateKey => (
          <div key={dateKey} style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 11, fontWeight: "700", color: "#9AA0AA", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8, paddingBottom: 6, borderBottom: "1px solid #E4E0DA" }}>
              {formatGroupDate(dateKey === "__tbc__" ? null : dateKey)}
              {dateKey !== "__tbc__" && <span style={{ fontWeight: "400", color: "#C0BDB8" }}> · {dateKey}/2026</span>}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {grouped[dateKey].map(s => {
                const t = SESSION_TYPES[s.type];
                const confirmed = s.confirmedStaff || [];
                const required = t.required;
                const stillNeeded = required - confirmed.length;
                const isActive = s.id === activeSession;
                return (
                  <div key={s.id} onClick={() => onSelectSession(s.id)}
                    style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "10px 14px", borderRadius: 7, cursor: "pointer", background: isActive ? "#EEF2FA" : "#fff", border: `1px solid ${isActive ? "#3A5FA5" : "#FCA5A5"}`, transition: "all 0.12s" }}
                    onMouseEnter={e => { if (!isActive) { e.currentTarget.style.background = "#FFF5F5"; e.currentTarget.style.borderColor = "#FC8A8A"; }}}
                    onMouseLeave={e => { if (!isActive) { e.currentTarget.style.background = "#fff"; e.currentTarget.style.borderColor = "#FCA5A5"; }}}
                  >
                    <div style={{ width: 4, alignSelf: "stretch", borderRadius: 2, background: t.color, flexShrink: 0 }} />
                    <div style={{ width: 56, flexShrink: 0, textAlign: "right" }}>
                      <span style={{ fontSize: 12, fontWeight: "600", color: "#6B7A8D" }}>{s.time ? formatTime12(s.time) : "—"}</span>
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 12, fontWeight: "700", color: t.textColor }}>{t.label}</span>
                        {s.participantId && <span style={{ fontSize: 12, color: "#1A2130", fontWeight: "600" }}>· {s.participantId}</span>}
                        <span style={{ fontSize: 10, color: "#991B1B", background: "#FEE2E2", border: "1px solid #FCA5A5", borderRadius: 10, padding: "1px 7px", marginLeft: "auto" }}>
                          needs {stillNeeded} more
                        </span>
                      </div>
                      <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                        {confirmed.length > 0
                          ? confirmed.map(m => (
                              <span key={m} style={{ fontSize: 10, color: "#065F46", background: "#D1FAE5", border: "1px solid #6EE7B755", borderRadius: 3, padding: "1px 7px" }}>✓ {m}</span>
                            ))
                          : <span style={{ fontSize: 10, color: "#9AA0AA", fontStyle: "italic" }}>No staff confirmed yet</span>
                        }
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Availability Calendar ────────────────────────────────────────────────────

function AvailabilityCalendar({ currentUser, team, personalUnavail, updatePersonalUnavail, onClose }) {
  const [weekStart, setWeekStart] = useState(() => getMonday(new Date()));
  const [viewUser, setViewUser] = useState(currentUser);
  const dragRef = useRef({ active: false, mode: "mark", cells: new Set() });
  const [, redraw] = useState(0);

  const HOURS = Array.from({ length: 19 }, (_, i) => (i + 6) % 24); // 6am – midnight
  const today = new Date(); today.setHours(0,0,0,0);
  const days = Array.from({ length: 5 }, (_, i) => addDays(weekStart, i));
  const isEditMode = viewUser === currentUser;

  // Commit drag selection on mouseup
  useEffect(() => {
    function onMouseUp() {
      if (!dragRef.current.active) return;
      const { mode, cells } = dragRef.current;
      dragRef.current = { active: false, mode: "mark", cells: new Set() };
      redraw(n => n + 1);
      if (!cells.size) return;
      updatePersonalUnavail(prev => {
        const next = { ...prev };
        cells.forEach(cellKey => {
          const sep = cellKey.lastIndexOf(":");
          const dayKey = cellKey.slice(0, sep);
          const hour = parseInt(cellKey.slice(sep + 1));
          const storeKey = `${viewUser}-${dayKey}`;
          const existing = next[storeKey] || [];
          if (mode === "mark") {
            if (!existing.includes(hour)) next[storeKey] = [...existing, hour].sort((a,b)=>a-b);
          } else {
            const filtered = existing.filter(h => h !== hour);
            if (filtered.length === 0) delete next[storeKey]; else next[storeKey] = filtered;
          }
        });
        return next;
      });
    }
    document.addEventListener("mouseup", onMouseUp);
    return () => document.removeEventListener("mouseup", onMouseUp);
  }, [viewUser, updatePersonalUnavail]);

  function cellDown(dayKey, hour) {
    if (!isEditMode) return;
    const storeKey = `${viewUser}-${dayKey}`;
    const currentlyUnavail = (personalUnavail[storeKey] || []).includes(hour);
    dragRef.current = { active: true, mode: currentlyUnavail ? "clear" : "mark", cells: new Set([`${dayKey}:${hour}`]) };
    redraw(n => n + 1);
  }

  function cellEnter(dayKey, hour) {
    if (!dragRef.current.active || !isEditMode) return;
    dragRef.current.cells.add(`${dayKey}:${hour}`);
    redraw(n => n + 1);
  }

  function cellIsUnavail(dayKey, hour) {
    const inDrag = dragRef.current.active && dragRef.current.cells.has(`${dayKey}:${hour}`);
    const committed = (personalUnavail[`${viewUser}-${dayKey}`] || []).includes(hour);
    if (inDrag) return dragRef.current.mode === "mark";
    return committed;
  }

  function clearDay(day) {
    const dayKey = dateToKey(day);
    updatePersonalUnavail(prev => {
      const next = { ...prev };
      delete next[`${viewUser}-${dayKey}`];
      return next;
    });
  }

  const weekLabel = `${weekStart.toLocaleDateString("en-GB",{day:"numeric",month:"short"})} – ${addDays(weekStart,4).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}`;

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ maxWidth: 740, width: "100%", padding: "22px 20px" }}>

        {/* Header */}
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 14, gap: 10, flexWrap: "wrap" }}>
          <div>
            <div style={{ fontSize: 16, fontWeight: "bold", color: "#1A2130" }}>Team Availability</div>
            <div style={{ fontSize: 11, color: "#9AA0AA", marginTop: 2 }}>{isEditMode ? "Click or drag cells to mark your unavailable hours" : `Viewing ${viewUser}'s schedule — select your name to edit`}</div>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
            <button className="btn-icon" style={{ padding: "3px 10px" }} onClick={() => setWeekStart(d => addDays(d, -7))}>‹</button>
            <button className="btn-icon" style={{ padding: "3px 10px" }} onClick={() => setWeekStart(getMonday(today))}>This week</button>
            <button className="btn-icon" style={{ padding: "3px 10px" }} onClick={() => setWeekStart(d => addDays(d, 7))}>›</button>
            <button className="btn btn-ghost" style={{ padding: "6px 14px", fontSize: 12 }} onClick={onClose}>Close</button>
          </div>
        </div>

        {/* Team member tabs */}
        <div style={{ display: "flex", gap: 5, marginBottom: 12, flexWrap: "wrap" }}>
          {team.map(member => (
            <button key={member} onClick={() => setViewUser(member)}
              style={{ padding: "4px 12px", borderRadius: 20, fontSize: 11, cursor: "pointer", fontFamily: "Arial, Helvetica, sans-serif", border: "1px solid", background: viewUser === member ? "#3A5FA5" : "#fff", color: viewUser === member ? "#fff" : "#6B7A8D", borderColor: viewUser === member ? "#3A5FA5" : "#D0CCC6", fontWeight: viewUser === member ? "600" : "normal", transition: "all 0.12s" }}
            >{member}{member === currentUser ? " (you)" : ""}</button>
          ))}
        </div>

        {/* Week label */}
        <div style={{ fontSize: 11, color: "#9AA0AA", marginBottom: 8, fontWeight: "600", letterSpacing: "0.04em" }}>{weekLabel}</div>

        {/* Grid */}
        <div style={{ overflowY: "auto", maxHeight: "calc(90vh - 260px)", userSelect: "none" }}>
          <div style={{ display: "grid", gridTemplateColumns: "50px repeat(5, 1fr)", gap: 2 }}>

            {/* Day header row */}
            <div />
            {days.map((day, i) => {
              const isToday = isSameDay(day, today);
              const dayKey = dateToKey(day);
              const blockedCount = (personalUnavail[`${viewUser}-${dayKey}`] || []).length;
              return (
                <div key={dayKey} style={{ textAlign: "center", padding: "4px 2px 6px", background: isToday ? "#EEF2FA" : "transparent", borderRadius: 5, marginBottom: 2 }}>
                  <div style={{ fontSize: 9, color: "#9AA0AA", textTransform: "uppercase", letterSpacing: "0.06em" }}>{DAY_SHORT[i]}</div>
                  <div style={{ fontSize: 15, fontWeight: isToday ? "700" : "400", color: isToday ? "#3A5FA5" : "#1A2130", lineHeight: 1.2 }}>{day.getDate()}</div>
                  <div style={{ fontSize: 9, color: "#C0BDB8", marginBottom: 2 }}>{day.toLocaleDateString("en-GB",{month:"short"})}</div>
                  {isEditMode && blockedCount > 0 && (
                    <button onClick={() => clearDay(day)} title="Clear day" style={{ fontSize: 9, color: "#991B1B", background: "none", border: "none", cursor: "pointer", fontFamily: "Arial, Helvetica, sans-serif", textDecoration: "underline", padding: 0 }}>clear</button>
                  )}
                </div>
              );
            })}

            {/* Hour rows */}
            {HOURS.flatMap(hour => [
              <div key={`lbl-${hour}`} style={{ fontSize: 10, color: "#9AA0AA", textAlign: "right", paddingRight: 6, height: 28, display: "flex", alignItems: "center", justifyContent: "flex-end" }}>
                {formatTime12(`${String(hour).padStart(2,"0")}:00`)}
              </div>,
              ...days.map(day => {
                const dayKey = dateToKey(day);
                const unavail = cellIsUnavail(dayKey, hour);
                const isToday = isSameDay(day, today);
                return (
                  <button key={`${dayKey}-${hour}`}
                    onMouseDown={() => cellDown(dayKey, hour)}
                    onMouseEnter={() => cellEnter(dayKey, hour)}
                    style={{ height: 28, border: `1px solid ${unavail ? "#FCA5A5" : "#E4E0DA"}`, borderRadius: 3, cursor: isEditMode ? "pointer" : "default", background: unavail ? "#FEE2E2" : isToday ? "#F0F4FF" : "#F7F5F2", transition: "background 0.07s, border-color 0.07s", display: "flex", alignItems: "center", justifyContent: "center" }}
                    onMouseEnterCapture={() => { if (!unavail && isEditMode) {} }}
                  >
                    {unavail && <span style={{ fontSize: 9, color: "#991B1B", fontWeight: "700", pointerEvents: "none" }}>✕</span>}
                  </button>
                );
              })
            ])}
          </div>
        </div>

        {/* Footer legend */}
        <div style={{ marginTop: 10, display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: "#6B7A8D" }}>
            <div style={{ width: 13, height: 13, background: "#FEE2E2", border: "1px solid #FCA5A5", borderRadius: 2 }} /> Unavailable
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: "#6B7A8D" }}>
            <div style={{ width: 13, height: 13, background: "#F7F5F2", border: "1px solid #E4E0DA", borderRadius: 2 }} /> Free
          </div>
          {isEditMode && <span style={{ fontSize: 11, color: "#9AA0AA" }}>Drag across multiple cells to block a range at once</span>}
        </div>
      </div>
    </div>
  );
}

// ─── Mount ────────────────────────────────────────────────────────────────────

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
